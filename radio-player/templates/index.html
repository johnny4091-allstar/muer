<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#121212">
  <title>Radio Player</title>
  <link rel="icon" href="/static/img/radio_icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div id="app">

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  SIDEBAR                                                   -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <nav id="sidebar">
    <div class="sidebar-top">
      <a class="app-logo" href="#">
        <span class="app-logo-icon">📻</span>
        <span class="app-logo-text">Radio Player</span>
      </a>

      <div class="nav-section">
        <button class="nav-btn active" id="nav-home" onclick="App.goHome()">
          <span class="nav-icon">🏠</span> Home
        </button>
        <button class="nav-btn" id="nav-search" onclick="App.focusSearch()">
          <span class="nav-icon">🔍</span> Search
        </button>
      </div>

      <div class="sidebar-divider"></div>

      <div class="nav-section">
        <button class="nav-btn" id="nav-favs" onclick="App.showFavorites()">
          <span class="nav-icon">💚</span> Your Library
        </button>
      </div>
    </div>

    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">Browse</div>

    <div class="sidebar-scroll" id="sidebar-scroll">
      <div class="sidebar-section-label" style="padding-top:0">Countries</div>
      <div id="country-list">
        <div class="sidebar-item" style="color:var(--text-3)">Loading…</div>
      </div>
      <div class="sidebar-section-label">Genres</div>
      <div id="genre-list">
        <div class="sidebar-item" style="color:var(--text-3)">Loading…</div>
      </div>
    </div>
  </nav>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  MAIN                                                      -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <main id="main">

    <!-- Top bar -->
    <div id="topbar">
      <div class="topbar-nav">
        <button class="topbar-nav-btn" onclick="history.back()" title="Back">‹</button>
        <button class="topbar-nav-btn" onclick="history.forward()" title="Forward">›</button>
      </div>
      <div id="search-wrap">
        <span id="search-icon">🔍</span>
        <input id="search-input" type="search" placeholder="What do you want to listen to?" autocomplete="off" spellcheck="false">
      </div>
      <span id="loading-indicator"></span>
      <div style="flex:1"></div>
      <span id="status-msg"></span>
    </div>

    <!-- Scrollable content -->
    <div id="content">

      <!-- Home view -->
      <div id="view-home">
        <div class="section">
          <div class="section-header">
            <h1 class="section-title" id="greeting">Good evening</h1>
          </div>
          <!-- Quick picks: 2×3 grid of horizontal cards -->
          <div class="quick-grid" id="quick-grid"></div>
        </div>

        <div class="section">
          <div class="section-header">
            <span class="section-sub">Top Stations</span>
            <span class="see-all" onclick="App.showAllTop()">SEE ALL</span>
          </div>
          <div class="card-grid" id="featured-grid"></div>
        </div>
      </div>

      <!-- All stations view -->
      <div id="view-all" style="display:none">
        <div class="section">
          <div class="section-header">
            <span class="section-sub" id="section-title">All Stations</span>
            <span id="station-count" style="font-size:12px;color:var(--text-3)"></span>
          </div>
          <div class="card-grid" id="station-grid"></div>
        </div>
      </div>

      <!-- Search view -->
      <div id="view-search" style="display:none">
        <div class="section">
          <div class="section-header">
            <span class="section-sub" id="search-title">Results</span>
            <span id="search-count" style="font-size:12px;color:var(--text-3)"></span>
          </div>
          <div class="card-grid" id="search-grid"></div>
        </div>
      </div>

      <!-- Favorites view -->
      <div id="view-favs" style="display:none">
        <div class="section">
          <div class="section-header">
            <span class="section-sub">Your Library</span>
            <span id="fav-count" style="font-size:12px;color:var(--text-3)"></span>
          </div>
          <div class="card-grid" id="fav-grid"></div>
        </div>
      </div>

    </div><!-- #content -->
  </main>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  NOW PLAYING BAR                                           -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <div id="player-bar">

    <!-- Left: now playing -->
    <div id="np-left">
      <div id="np-favicon">📻</div>
      <div id="np-info">
        <div id="np-name">Select a station to play</div>
        <div id="np-meta"></div>
        <div id="np-stream-title"></div>
      </div>
      <button id="np-fav-btn" title="Save to library" onclick="App.toggleCurrentFav()">♡</button>
    </div>

    <!-- Center: controls -->
    <div id="np-center">
      <div id="np-controls">
        <button class="ctrl-btn" id="stop-btn" title="Stop">⏹</button>
        <button id="play-btn" title="Play / Pause (Space)">▶</button>
      </div>
    </div>

    <!-- Right: volume + tools -->
    <div id="np-right">
      <span id="timer-display"></span>
      <button class="tool-btn" id="timer-btn" onclick="openTimerModal()" title="Sleep Timer">⏰ Sleep</button>
      <button class="tool-btn" id="eq-btn"    onclick="openEQModal()"    title="Equalizer">EQ</button>
      <span id="vol-icon" title="Volume">🔊</span>
      <input id="vol-slider" type="range" min="0" max="100" value="80" title="Volume">
      <span id="vol-label">80%</span>
    </div>

  </div>
</div><!-- #app -->

<!-- ══════════════════════════════════════════════════════════════ -->
<!--  EQUALIZER MODAL                                               -->
<!-- ══════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="eq-modal">
  <div class="modal">
    <h3>🎚 Equalizer</h3>
    <div id="eq-content"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="eq-reset">Reset</button>
      <button class="btn btn-secondary" onclick="document.getElementById('eq-modal').classList.remove('open')">Close</button>
      <button class="btn btn-primary" id="eq-apply">Apply</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════ -->
<!--  SLEEP TIMER MODAL                                             -->
<!-- ══════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="timer-modal">
  <div class="modal">
    <h3>⏰ Sleep Timer</h3>
    <p style="color:var(--text-2);font-size:13px;margin-bottom:4px">Stop playback after:</p>
    <div class="timer-options">
      <button class="timer-pill" data-min="15">15 min</button>
      <button class="timer-pill" data-min="30">30 min</button>
      <button class="timer-pill" data-min="45">45 min</button>
      <button class="timer-pill" data-min="60">1 hour</button>
      <button class="timer-pill" data-min="90">90 min</button>
      <button class="timer-pill" data-min="120">2 hours</button>
    </div>
    <div class="timer-custom">
      <span>Custom:</span>
      <input id="custom-timer-input" type="number" min="1" max="999" value="30">
      <span>minutes</span>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="timer-cancel">Disable Timer</button>
      <button class="btn btn-secondary" onclick="document.getElementById('timer-modal').classList.remove('open')">Close</button>
      <button class="btn btn-primary" id="timer-set">Set Timer</button>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
