services:
  postgres:
    image: postgres:15-alpine
    container_name: iptvsaas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: iptvsaas
      POSTGRES_USER: iptvsaas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iptvsaas"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: iptvsaas_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: iptvsaas_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://iptvsaas:${POSTGRES_PASSWORD}@postgres:5432/iptvsaas
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      DEVICE_API_KEY_SALT: ${DEVICE_API_KEY_SALT}
      STORAGE_PATH: /storage
      NODE_ENV: production
    volumes:
      - storage_dvr:/storage/dvr
      - storage_uploads:/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  ffmpeg-worker:
    build:
      context: ./ffmpeg-worker
      dockerfile: Dockerfile
    container_name: iptvsaas_ffmpeg
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL: postgresql://iptvsaas:${POSTGRES_PASSWORD}@postgres:5432/iptvsaas
      STORAGE_PATH: /storage
    volumes:
      - storage_dvr:/storage/dvr
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal

  apk-builder:
    build:
      context: ./apk-builder
      dockerfile: Dockerfile
    container_name: iptvsaas_apk_builder
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://iptvsaas:${POSTGRES_PASSWORD}@postgres:5432/iptvsaas
      PORTAL_URL: ${NEXTAUTH_URL}
      STORAGE_PATH: /storage
      ANDROID_HOME: /opt/android-sdk
    volumes:
      - storage_uploads:/storage/uploads
      - ./android-template:/android-template:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: nginx:1.25-alpine
    container_name: iptvsaas_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  storage_dvr:
  storage_uploads:

networks:
  internal:
    driver: bridge
